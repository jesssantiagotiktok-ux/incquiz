<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Single Question Code Quiz</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.quiz-box {
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  text-align:center;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2 { color:#0a5c2f; }

#instruction { margin-bottom:15px; }
input { padding:10px; width:80%; margin-bottom:15px; }
button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#0a5c2f;
  color:white;
  margin:5px 0;
}

#question { font-size:18px; margin:15px 0; }
.choice {
  display:block;
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#e6e6e6;
  cursor:pointer;
}
.correct { background:#2ecc71;color:white; }
.wrong { background:#e74c3c;color:white; }

#codeBox {
  margin-top:20px;
  padding:15px;
  background:#87CEEB;
  border-radius:8px;
  font-weight:bold;
  font-size:20px;
  display:none;
}
</style>
</head>

<body>

<div class="quiz-box" id="quizBox">

  <div id="otpBox">
    <h2>Enter One-Time Password</h2>
    <div id="instruction">Please enter the OTP to access the quiz.</div>
    <input type="text" id="otpInput" placeholder="Enter OTP">
    <br>
    <button id="otpBtn">Submit</button>
  </div>

  <div id="quizContent" style="display:none;">
    <h2>Code Quiz</h2>
    <div id="question"></div>
    <div id="choices"></div>
    <div id="codeBox"></div>
  </div>

</div>

<script>
// ====== ONE-TIME PASSWORD SYSTEM ======
const ONE_TIME_PASSWORD = "MNOP";
const OTP_USED_KEY = "otp_used";

const otpBox = document.getElementById("otpBox");
const otpInput = document.getElementById("otpInput");
const otpBtn = document.getElementById("otpBtn");
const quizContent = document.getElementById("quizContent");

// Check if OTP already used
if(localStorage.getItem(OTP_USED_KEY) === "true"){
  otpBox.innerHTML = "<h2>Access Denied</h2><p>You have already used the one-time password on this device.</p>";
}

// Submit OTP
otpBtn.onclick = () => {
  if(otpInput.value === ONE_TIME_PASSWORD){
    localStorage.setItem(OTP_USED_KEY, "true");
    otpBox.style.display = "none";
    quizContent.style.display = "block";
    initQuiz();
  } else {
    alert("Incorrect OTP!");
  }
};

// ====== QUIZ SYSTEM ======
function initQuiz(){
  const correctSound = new Audio("audio/fact.mp3");
  const wrongSound = new Audio("audio/mali.mp3");

  // Single question
  const questionData = {
    question: "10 ÷ 2 = ?",
    choices: ["4","6","5","8"],
    answer: 2
  };

  const questionDiv = document.getElementById("question");
  const choicesDiv = document.getElementById("choices");
  const codeBox = document.getElementById("codeBox");

  // Load question
  questionDiv.textContent = questionData.question;

  questionData.choices.forEach((c,i) => {
    let btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = c;
    btn.onclick = () => selectAnswer(i, btn);
    choicesDiv.appendChild(btn);
  });

  // Handle answer
  function selectAnswer(i, btn){
    const buttons = document.querySelectorAll(".choice");
    buttons.forEach(b => b.disabled = true);

    if(i === questionData.answer){
      btn.classList.add("correct");
      correctSound.play();
      setTimeout(showCode, 800);
    } else {
      btn.classList.add("wrong");
      wrongSound.play();
      setTimeout(() => {
        buttons.forEach(b => b.disabled = false);
        btn.classList.remove("wrong");
        // Show "Sorry" instead of code
        codeBox.style.display = "block";
        codeBox.textContent = "Sorry";
      }, 800);
    }
  }

  function showCode(){
    choicesDiv.style.display = "none";
    questionDiv.textContent = "Congratulations! Here is your code:";
    let code = Math.random().toString(36).substring(2,8).toUpperCase();
    codeBox.style.display = "block";
    codeBox.textContent = code;
  }
}
</script>

</body>
</html>
